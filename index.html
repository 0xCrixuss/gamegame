<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Köy Oyunu 3D</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#000;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;font-family:'Nunito',sans-serif;}
        #top-bar{position:fixed;top:0;left:0;right:0;height:50px;background:linear-gradient(180deg,rgba(0,0,0,0.8),rgba(0,0,0,0.3),transparent);display:flex;align-items:center;justify-content:space-between;padding:6px 12px;z-index:20;}
        .sb{background:linear-gradient(180deg,#3a3a3a,#1a1a1a);border:2px solid #555;border-radius:20px;padding:4px 12px;display:flex;align-items:center;gap:5px;box-shadow:0 2px 6px rgba(0,0,0,0.5);}
        .sv{color:#fff;font-weight:800;font-size:14px;}
        #xp-wrap{position:fixed;top:46px;left:50%;transform:translateX(-50%);width:140px;height:7px;background:rgba(0,0,0,0.5);border-radius:4px;border:1px solid #555;z-index:20;overflow:hidden;}
        #xp-fill{height:100%;background:linear-gradient(90deg,#4CAF50,#CDDC39);border-radius:4px;transition:width 0.4s;}
        #task-panel{position:fixed;top:58px;left:6px;background:linear-gradient(180deg,rgba(20,15,8,0.93),rgba(30,22,12,0.9));border:2px solid #8B7355;border-radius:10px;padding:5px 7px;z-index:20;max-width:135px;box-shadow:0 3px 10px rgba(0,0,0,0.5);color:#e8dcc8;font-size:10px;max-height:25vh;overflow-y:auto;transition:max-height 0.3s,opacity 0.3s;}
        #task-panel.mini{max-height:26px;overflow:hidden;cursor:pointer;opacity:0.7;}
        .tired-bar{background:rgba(255,140,0,0.15);border:1px solid rgba(255,140,0,0.4);border-radius:6px;padding:4px 6px;margin-top:4px;text-align:center;font-size:9px;color:#ffa500;}
        .tired-bar .tb-fill{height:3px;background:linear-gradient(90deg,#ff6b00,#ffa500);border-radius:2px;margin-top:2px;}
        .quest-count{font-size:9px;color:#aaa;margin-bottom:3px;}
        .th{font-weight:900;font-size:13px;color:#FFD700;margin-bottom:6px;border-bottom:1px solid rgba(139,115,85,0.4);padding-bottom:4px;}
        .ti{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
        .tn{font-weight:700;font-size:11px;}
        .tp{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin:2px 0;}
        .tpf{height:100%;background:linear-gradient(90deg,#FF9800,#FFD700);border-radius:2px;}
        .tr{font-size:10px;color:#FFD700;}
        #inv-bar{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,rgba(40,30,20,0.95),rgba(20,15,8,0.95));border:2px solid #8B7355;border-radius:14px;padding:5px 7px;display:flex;gap:4px;z-index:20;}
        .is{width:44px;height:44px;background:rgba(255,255,255,0.05);border:2px solid rgba(139,115,85,0.5);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;position:relative;cursor:pointer;}
        .is.sel{border-color:#FFD700;background:rgba(255,215,0,0.15);}
        .is .ct{position:absolute;bottom:0;right:2px;font-size:9px;color:#fff;font-weight:900;text-shadow:0 1px 2px #000;}
        #shop-btn{position:fixed;bottom:8px;right:8px;width:46px;height:46px;background:linear-gradient(180deg,#8B7355,#5a4a35);border:2px solid #FFD700;border-radius:12px;color:#fff;font-size:20px;cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,0.4);}
        #shop-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:90;}
        #shop-p{display:none;position:fixed;bottom:62px;right:8px;width:255px;max-height:45vh;background:linear-gradient(180deg,#2a1f14,#1a1208);border:2px solid #8B7355;border-radius:14px;z-index:100;color:#e8dcc8;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.6);}
        .shd{background:linear-gradient(180deg,#8B7355,#5a4a35);padding:8px;text-align:center;font-size:13px;font-weight:900;color:#FFD700;border-bottom:2px solid #FFD700;position:relative;}
        #shx{position:absolute;top:8px;right:12px;background:rgba(0,0,0,0.3);border:2px solid rgba(255,255,255,0.2);color:#fff;font-size:16px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        .stb{display:flex;background:rgba(0,0,0,0.3);}
        .st{flex:1;padding:8px 4px;background:none;border:none;border-bottom:3px solid transparent;color:#aaa;font-size:11px;font-weight:700;cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;}
        .st.ac{color:#FFD700;border-bottom-color:#FFD700;}
        .sb2{padding:6px;max-height:38vh;overflow-y:auto;}
        .si{display:flex;align-items:center;gap:8px;padding:8px;margin:4px 0;background:rgba(255,255,255,0.04);border:1px solid rgba(139,115,85,0.3);border-radius:10px;}
        .sii{width:40px;height:40px;background:rgba(0,0,0,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;}
        .si .inf{flex:1;}.sin{font-weight:800;font-size:12px;color:#fff;}.sid{font-size:10px;color:#aaa;margin-top:1px;}
        .bb{background:linear-gradient(180deg,#5cb85c,#3d8b3d);color:#fff;border:2px solid #2d6b2d;padding:6px 10px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
        .bb:disabled{background:linear-gradient(180deg,#555,#333);border-color:#444;color:#888;}
        .bb.ow{background:linear-gradient(180deg,#2196F3,#1565C0);border-color:#0D47A1;}
        #notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:linear-gradient(180deg,rgba(30,22,12,0.95),rgba(15,10,5,0.95));border:2px solid #8B7355;color:#FFD700;padding:14px 24px;border-radius:12px;font-size:15px;font-weight:800;z-index:200;display:none;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.6);opacity:0;transition:opacity 0.3s,transform 0.3s;}
        #notif.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
        @keyframes coinBounce{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(0.9)}100%{transform:scale(1)}}
        @keyframes questPop{0%{transform:translate(-50%,-50%) scale(0.3);opacity:0}50%{transform:translate(-50%,-50%) scale(1.1)}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
        @keyframes successBounce{0%{transform:scale(0.5) rotate(-5deg)}40%{transform:scale(1.15) rotate(2deg)}70%{transform:scale(0.95) rotate(-1deg)}100%{transform:scale(1) rotate(0)}}
        @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(120px) rotate(720deg);opacity:0}}
        @keyframes slideIn{0%{transform:translateX(-30px);opacity:0}100%{transform:translateX(0);opacity:1}}
        @keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.3)}50%{box-shadow:0 0 20px rgba(255,215,0,0.7)}}
        .coin-anim{animation:coinBounce 0.4s ease;}
        #m3ov.show{animation:questPop 0.4s ease-out;}
        #m3res{animation:successBounce 0.5s ease-out;}
        .task-new{animation:slideIn 0.4s ease-out;}
        #confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:320;overflow:hidden;}
        .confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiFall 1.5s ease-in forwards;}
        #apop{display:none;position:fixed;z-index:50;background:linear-gradient(180deg,rgba(30,22,12,0.95),rgba(15,10,5,0.95));border:2px solid #8B7355;border-radius:12px;padding:8px;box-shadow:0 4px 16px rgba(0,0,0,0.6);min-width:130px;}
        .ai{display:flex;align-items:center;gap:6px;padding:8px 10px;margin:3px 0;background:rgba(255,255,255,0.05);border-radius:8px;cursor:pointer;color:#e8dcc8;font-size:13px;font-weight:700;}
        .ai:active{background:rgba(255,215,0,0.2);}
        #m3ov{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;flex-direction:column;align-items:center;justify-content:center;display:flex;opacity:0;pointer-events:none;transition:opacity 0.3s ease;}
        #m3ov.show{opacity:1;pointer-events:auto;}
        #m3ov .m3-inner{opacity:0;transition:opacity 0.2s ease;}
        #m3ov.show .m3-inner{opacity:1;}
        #m3hd{color:#FFD700;font-size:17px;font-weight:900;margin-bottom:6px;text-align:center;}
        #m3st{display:flex;gap:16px;margin-bottom:8px;color:#fff;font-weight:700;font-size:13px;}
        #m3st span{background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:8px;}
        #m3cv{border-radius:14px;box-shadow:0 0 24px rgba(0,0,0,0.5);touch-action:none;max-width:92vw;max-height:55vh;}
        #m3res{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse at top,rgba(40,32,18,0.98),rgba(15,10,5,0.98));border:3px solid #FFD700;border-radius:22px;padding:0;text-align:center;z-index:310;min-width:240px;overflow:hidden;}
        .m3r-top{background:linear-gradient(180deg,#FFD700,#F4A300);padding:16px 20px 12px;position:relative;}
        .m3r-star{font-size:42px;display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));}
        .m3r-title{font-size:20px;font-weight:900;color:#5a3200;margin-top:4px;}
        .m3r-body{padding:14px 20px 18px;}
        .m3r-score{color:#FFD700;font-size:15px;font-weight:800;margin-bottom:4px;}
        .m3r-detail{color:#aaa;font-size:11px;margin-bottom:14px;}
        .m3r-btn{display:inline-block;padding:10px 28px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin:3px;border:none;transition:transform 0.15s;}
        .m3r-btn:active{transform:scale(0.95);}
        .m3r-ok{background:linear-gradient(180deg,#5cb85c,#3d8b3d);color:#fff;box-shadow:0 3px 0 #2d6b2d;}
        .m3r-retry{background:linear-gradient(180deg,#e67e22,#d35400);color:#fff;box-shadow:0 3px 0 #a04000;}
        .quest-bubble{position:fixed;top:0;left:0;display:flex;align-items:center;gap:4px;background:rgba(20,15,8,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1.5px solid rgba(255,215,0,0.5);border-radius:20px;padding:3px 8px 3px 5px;box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:pointer;will-change:transform;transition:border-color 0.2s;}
        .quest-bubble:active{border-color:#FFD700;}
        .quest-bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid rgba(255,215,0,0.5);}
        .qb-icon{font-size:15px;line-height:1;background:rgba(255,215,0,0.15);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
        .qb-name{font-size:9px;font-weight:800;color:#FFD700;white-space:nowrap;}
        .qb-rw{font-size:8px;font-weight:700;color:#aaa;}
        #storage-panel{position:fixed;top:58px;right:8px;background:linear-gradient(180deg,rgba(20,15,8,0.93),rgba(30,22,12,0.9));border:2px solid #8B7355;border-radius:10px;padding:5px 8px;z-index:20;min-width:90px;box-shadow:0 3px 10px rgba(0,0,0,0.5);color:#e8dcc8;font-size:10px;}
        .st-hd{font-weight:900;font-size:11px;color:#FFD700;margin-bottom:3px;border-bottom:1px solid rgba(139,115,85,0.4);padding-bottom:2px;}
        .st-item{display:flex;align-items:center;gap:4px;padding:2px 0;}
        .st-ic{font-size:13px;}.st-ct{font-weight:800;color:#FFD700;font-size:11px;}.st-lb{font-size:9px;color:#aaa;}
        .st-empty{color:#888;font-size:9px;padding:2px 0;}
        .bb.trade{background:linear-gradient(180deg,#e67e22,#d35400);border-color:#a04000;font-size:9px;padding:4px 6px;}
        .trade-cost{font-size:9px;color:#ffa;margin-top:2px;}
        /* MEMORY GAME */
        .mg-ov{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
        .mg-ov.show{opacity:1;pointer-events:auto;}
        .mg-hd{color:#FFD700;font-size:17px;font-weight:900;margin-bottom:6px;}
        .mg-info{color:#fff;font-size:13px;font-weight:700;margin-bottom:8px;}
        .mg-info span{background:rgba(255,255,255,0.1);padding:3px 10px;border-radius:8px;margin:0 4px;}
        .mg-grid{display:grid;gap:6px;max-width:92vw;}
        .mg-card{background:linear-gradient(180deg,#5a4a35,#3a2a1a);border:2px solid #8B7355;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;aspect-ratio:1;transition:transform 0.3s,background 0.3s;}
        .mg-card.flip{background:linear-gradient(180deg,#2a4a2a,#1a3a1a);border-color:#5cb85c;transform:rotateY(180deg);}
        .mg-card.done{background:linear-gradient(180deg,#2a3a5a,#1a2a4a);border-color:#FFD700;opacity:0.6;}
        .mg-card .face{display:none;}.mg-card.flip .face,.mg-card.done .face{display:block;}
        .mg-card .back{display:block;}.mg-card.flip .back,.mg-card.done .back{display:none;}
    </style>
</head>
<body>
<div id="top-bar">
    <div class="sb">👤 <span class="sv">Yaş <span id="av">7</span></span></div>
    <div class="sb">💰 <span class="sv"><span id="mv">0</span></span></div>
</div>
<div id="xp-wrap"><div id="xp-fill" style="width:0%"></div></div>
<div id="task-panel" onclick="this.classList.toggle('mini')"></div>
<div id="storage-panel" style="display:none"><div class="st-hd">📦 Depo</div><div id="storage-counts"></div></div>
<div id="inv-bar"></div>
<button id="shop-btn">🏪</button>
<div id="shop-ov"></div>
<div id="shop-p"><div class="shd">🏪 Köy Dükkanı<button id="shx">&times;</button></div><div class="stb" id="stbs"></div><div class="sb2" id="sitms"></div></div>
<div id="notif"></div>
<div id="apop"></div>
<div id="m3ov">
  <div class="m3-inner">
    <div id="m3hd">Puzzle!</div>
    <div id="m3st"><span>Skor: <b id="m3s">0</b>/<b id="m3t">500</b></span><span>Hamle: <b id="m3m">20</b></span></div>
    <canvas id="m3cv" width="368" height="368"></canvas>
    <div id="m3res">
      <div class="m3r-top"><span class="m3r-star" id="m3star">⭐</span><div class="m3r-title" id="m3rt">Başarılı!</div></div>
      <div class="m3r-body"><div class="m3r-score" id="m3rx"></div><div class="m3r-detail" id="m3rd"></div>
      <button class="m3r-btn m3r-ok" id="m3ok">✓ Tamam</button><button class="m3r-btn m3r-retry" id="m3ry">↻ Tekrar</button></div>
    </div>
  </div>
</div>
<div id="confetti-layer"></div>
<!-- MEMORY GAME -->
<div class="mg-ov" id="memOv">
  <div class="mg-hd" id="memHd">Hafıza Oyunu</div>
  <div class="mg-info">Hamle: <span id="memMv">0</span> Eşleşme: <span id="memPr">0/6</span></div>
  <div class="mg-grid" id="memGrid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// KÖY OYUNU 3D - Optimized with InstancedMesh
// ============================================================
const W=innerWidth,H=innerHeight;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.FogExp2(0x87CEEB,0.012);
const cam=new THREE.PerspectiveCamera(50,W/H,0.1,200);
const ren=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
ren.setSize(W,H);ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.shadowMap.enabled=true;ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;ren.toneMappingExposure=1.1;
document.body.appendChild(ren.domElement);
// Particle overlay canvas
const pCv=document.createElement('canvas');pCv.id='particle-cv';
pCv.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:15;';
pCv.width=innerWidth;pCv.height=innerHeight;
document.body.appendChild(pCv);
const pCtx=pCv.getContext('2d');
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);pCv.width=innerWidth;pCv.height=innerHeight;});

scene.add(new THREE.AmbientLight(0xffeedd,0.5));
scene.add(new THREE.HemisphereLight(0x87CEEB,0x3a7a2a,0.4));
const sun=new THREE.DirectionalLight(0xfff5e0,1.1);
sun.position.set(60,50,60);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=150;
sun.shadow.camera.left=-50;sun.shadow.camera.right=50;
sun.shadow.camera.top=50;sun.shadow.camera.bottom=-50;
sun.shadow.bias=-0.001;scene.add(sun);

const SZ=120;

// ===== BULUTLAR =====
const cloudGroup=new THREE.Group();scene.add(cloudGroup);
for(let i=0;i<12;i++){
    const cg=new THREE.Group();
    const cm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.5+Math.random()*0.2,fog:false});
    for(let j=0;j<3+~~(Math.random()*3);j++){
        const s=new THREE.Mesh(new THREE.SphereGeometry(1.5+Math.random()*2,6,4),cm);
        s.position.set(j*2-2+Math.random(),Math.random()*0.5,Math.random()*1.5-0.75);
        s.scale.y=0.4;cg.add(s);
    }
    cg.position.set(Math.random()*SZ,18+Math.random()*8,Math.random()*SZ);
    cg.userData.speed=0.003+Math.random()*0.005;
    cloudGroup.add(cg);
}

// ===== SES SİSTEMİ (Web Audio API) =====
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type='sine',vol=0.15,slide=0){
    try{const ctx=ensureAudio();const o=ctx.createOscillator();const g=ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,freq+slide),ctx.currentTime+dur);
    g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);}catch(e){}
}
const SFX={
    tap(){playTone(800,0.08,'sine',0.1);},
    swap(){playTone(400,0.12,'sine',0.12);setTimeout(()=>playTone(500,0.1,'sine',0.12),60);},
    match(){playTone(600,0.15,'sine',0.15);setTimeout(()=>playTone(800,0.12,'sine',0.15),80);setTimeout(()=>playTone(1000,0.15,'sine',0.12),160);},
    bigMatch(){playTone(500,0.2,'square',0.1);setTimeout(()=>playTone(700,0.15,'square',0.1),100);setTimeout(()=>playTone(900,0.15,'sine',0.12),200);setTimeout(()=>playTone(1200,0.2,'sine',0.1),300);},
    cascade(){playTone(300,0.1,'triangle',0.08);setTimeout(()=>playTone(450,0.1,'triangle',0.08),50);},
    fail(){playTone(300,0.3,'sawtooth',0.08,-200);},
    success(){[0,100,200,300,400].forEach((d,i)=>setTimeout(()=>playTone(500+i*100,0.2,'sine',0.12),d));},
    coin(){playTone(1200,0.08,'sine',0.1);setTimeout(()=>playTone(1600,0.12,'sine',0.1),80);},
    questPop(){playTone(600,0.1,'sine',0.08);setTimeout(()=>playTone(900,0.15,'sine',0.1),100);},
    buy(){playTone(800,0.1,'square',0.08);setTimeout(()=>playTone(600,0.15,'square',0.08),100);},
    error(){playTone(200,0.2,'sawtooth',0.1);setTimeout(()=>playTone(150,0.25,'sawtooth',0.08),150);},
    levelUp(){[0,120,240,360,480,600].forEach((d,i)=>setTimeout(()=>playTone(400+i*80,0.25,'sine',0.12),d));},
    pickup(){playTone(1000,0.06,'sine',0.1);setTimeout(()=>playTone(1300,0.08,'sine',0.08),50);},
    pop(){playTone(900+Math.random()*400,0.06,'sine',0.08);},
};

// ===== PARÇACIK SİSTEMİ (2D Overlay) =====
const particles=[];
function spawnParticles(sx,sy,color,count=8,spread=40){
    for(let i=0;i<count;i++){
        particles.push({x:sx,y:sy,vx:(Math.random()-0.5)*spread*0.06,vy:-Math.random()*spread*0.04-0.5,
            life:1,decay:0.015+Math.random()*0.01,size:3+Math.random()*4,color,rot:Math.random()*360,rv:(Math.random()-0.5)*8});
    }
}
function spawnConfetti(){

function lk(cy,cx,r){for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++)if(y>=0&&y<SZ&&x>=0&&x<SZ&&Math.sqrt((x-cx)**2+(y-cy)**2)<r)map[y][x].t=T.WATER;}
function pb(x,y,t,w,h){for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++)if(y+dy<SZ&&x+dx<SZ)map[y+dy][x+dx].t=t;}

function updatePlayer(dt){
    if(!playerWalking||!playerTarget)return;
    const dx=playerTarget.x-playerGroup.position.x,dz=playerTarget.z-playerGroup.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<0.5){playerWalking=false;if(playerCb){const c=playerCb;playerCb=null;c();}return;}
    const speed=0.008*dt;
    playerGroup.position.x+=dx/dist*speed;

    playerGroup.rotation.y=Math.atan2(dx,dz);
    // Leg animation

    }else if(e.touches.length===2){
        pinch=true;drag=false;pinchMode=null;pinchAccRot=0;pinchAccZoom=0;
        const t0=e.touches[0],t1=e.touches[1];
        pDist=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
        pinchStartDist=pDist;
        pAng=Math.atan2(t1.clientY-t0.clientY,t1.clientX-t0.clientX);
        pinchStartAng=pAng;
        lastM={x:(t0.clientX+t1.clientX)/2,y:(t0.clientY+t1.clientY)/2};
    }
},{passive:false});
ren.domElement.addEventListener('touchmove',e=>{e.preventDefault();
    if(pinch&&e.touches.length===2){
        const t0=e.touches[0],t1=e.touches[1];
        const d=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
        const ang=Math.atan2(t1.clientY-t0.clientY,t1.clientX-t0.clientX);
        const mid={x:(t0.clientX+t1.clientX)/2,y:(t0.clientY+t1.clientY)/2};
        // Detect dominant gesture: zoom vs rotate vs tilt
        const zoomDelta=Math.abs(d-pDist);
        const rotDelta=Math.abs(ang-pAng);
        const tiltDelta=Math.abs(mid.y-lastM.y);
        // Always apply zoom (most natural)
        cDist=Math.max(8,Math.min(50,cDist-(d-pDist)*0.05));
        // Apply rotation with higher threshold to avoid accidental twists
        if(rotDelta>0.015){cAngH-=(ang-pAng)*0.8;}
        // Apply tilt from vertical two-finger drag
        if(tiltDelta>2){const dy=mid.y-lastM.y;cAngV=Math.max(0.3,Math.min(1.4,cAngV+dy*0.003));}
        pDist=d;pAng=ang;lastM=mid;
    }else if(drag&&e.touches.length===1){
        const dx=e.touches[0].clientX-lastM.x,dy=e.touches[0].clientY-lastM.y;
        const sp=cDist*0.003;
        cTgt.x-=(dx*Math.cos(cAngH)+dy*Math.sin(cAngH))*sp;

// ---- RAYCASTER TAP ----
const ray=new THREE.Raycaster();
const popup=document.getElementById('apop');

function handleTap(sx,sy){
    popup.style.display='none';
    // Raycast against ground to get tile position
    const mouse=new THREE.Vector2((sx/innerWidth)*2-1,-(sy/innerHeight)*2+1);
    ray.setFromCamera(mouse,cam);

    // Hit ground plane
    const plane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
    const pt=new THREE.Vector3();
    ray.ray.intersectPlane(plane,pt);
    if(!pt)return;

    const tx=Math.round(pt.x),ty=Math.round(pt.z);
    if(tx<0||tx>=SZ||ty<0||ty>=SZ)return;

    // Also check building hits
    const bHits=ray.intersectObjects(bldgGroup.children,true);
    let bTile=null;
    if(bHits.length){
        let obj=bHits[0].object;
        while(obj.parent&&obj.parent!==bldgGroup)obj=obj.parent;
        if(obj.userData&&obj.userData.tileType)bTile=obj.userData;
    }

    const tile=map[ty][tx];
    const tt=bTile?bTile.tileType:tile.t;
    const ftx=bTile?bTile.tileX:tx;
    const fty=bTile?bTile.tileY:ty;

    const acts=getActs(ftx,fty,tt,tile);
    if(!acts.length){
        // Walk player to clicked location (no sound)
        if(tx>=0&&tx<SZ&&ty>=0&&ty<SZ)walkPlayerTo(tx,ty,null);
        return;
    }
    SFX.tap();

    popup.innerHTML='';
    acts.forEach(a=>{
        const d=document.createElement('div');d.className='ai';
        d.textContent=a.ic+' '+a.lb;
        d.onclick=()=>{popup.style.display='none';startAct(a);};
        popup.appendChild(d);
    });
    popup.style.display='block';
    popup.style.left=Math.min(sx,innerWidth-150)+'px';
    popup.style.top=Math.max(55,sy-popup.offsetHeight-10)+'px';
}

function startAct(a){

    ntf(a.ic+' '+a.lb+' tamamlandı!',SFX.pickup);updUI();
}

const m3cv=document.getElementById('m3cv'),m3x=m3cv.getContext('2d');
const GR=7,CL=52;m3cv.width=GR*CL;m3cv.height=GR*CL;
const CI=['🍎','🍌','🫐','🐔','🍊','🥝'];
let m3g=[],m3s=0,m3mv=0,m3tg=0,m3mx=20,m3sel=null,m3anim=false,m3cb=null;

function retryM3(){document.getElementById('m3res').style.display='none';m3s=0;m3mv=m3mx;m3sel=null;m3anim=false;document.getElementById('m3s').textContent='0';document.getElementById('m3m').textContent=m3mv;initG();drawG();}

document.getElementById('m3ok').onclick=()=>closeM3(true);
document.getElementById('m3ry').onclick=retryM3;

function initG(){const NC=CI.length;m3g=[];for(let r=0;r<GR;r++){m3g[r]=[];for(let c=0;c<GR;c++)m3g[r][c]=~~(Math.random()*NC);}
let f=true;while(f){f=false;for(let r=0;r<GR;r++)for(let c=0;c<GR;c++){while(c>=2&&m3g[r][c]===m3g[r][c-1]&&m3g[r][c]===m3g[r][c-2]){m3g[r][c]=(m3g[r][c]+1)%NC;f=true;}while(r>=2&&m3g[r][c]===m3g[r-1][c]&&m3g[r][c]===m3g[r-2][c]){m3g[r][c]=(m3g[r][c]+1)%NC;f=true;}}}}

function drawG(){
m3x.fillStyle='#1a120a';m3x.fillRect(0,0,m3cv.width,m3cv.height);
for(let r=0;r<GR;r++)for(let c=0;c<GR;c++){
    // Cell bg - brighter colors
    const light=(r+c)%2===0;
    m3x.fillStyle=light?'#4a3a28':'#3d2e1e';
    m3x.beginPath();m3x.roundRect(c*CL+2,r*CL+2,CL-4,CL-4,8);m3x.fill();
    if(m3g[r][c]>=0){
        if(m3sel&&m3sel.r===r&&m3sel.c===c){
            m3x.fillStyle='rgba(255,215,0,0.4)';m3x.beginPath();m3x.roundRect(c*CL+2,r*CL+2,CL-4,CL-4,8);m3x.fill();
            m3x.strokeStyle='#FFD700';m3x.lineWidth=3;m3x.beginPath();m3x.roundRect(c*CL+2,r*CL+2,CL-4,CL-4,8);m3x.stroke();
        }
        m3x.font='38px serif';m3x.textAlign='center';m3x.textBaseline='middle';
        m3x.fillStyle='#fff';
        m3x.fillText(CI[m3g[r][c]],c*CL+CL/2,r*CL+CL/2+2);
    }
}}

// ---- SWIPE MECHANIC ----
let m3drag=null; // {r,c,sx,sy}
function m3getRC(sx,sy){
    const rect=m3cv.getBoundingClientRect();
    const c=~~((sx-rect.left)/(rect.width/GR)),r=~~((sy-rect.top)/(rect.height/GR));
    if(r<0||r>=GR||c<0||c>=GR)return null;
    return{r,c};
}
function m3down(sx,sy){
    if(m3anim||m3mv<=0)return;
    const rc=m3getRC(sx,sy);if(!rc)return;
    m3drag={r:rc.r,c:rc.c,sx,sy};
    m3sel={r:rc.r,c:rc.c};SFX.tap();drawG();
}
function m3move(sx,sy){
    if(!m3drag||m3anim)return;
    const dx=sx-m3drag.sx,dy=sy-m3drag.sy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<15)return; // min swipe distance
    let tr,tc;
    if(Math.abs(dx)>Math.abs(dy)){tc=m3drag.c+(dx>0?1:-1);tr=m3drag.r;}
    else{tr=m3drag.r+(dy>0?1:-1);tc=m3drag.c;}
    if(tr<0||tr>=GR||tc<0||tc>=GR){m3drag=null;m3sel=null;drawG();return;}
    m3sel=null;drawG();
    trySwap(m3drag.r,m3drag.c,tr,tc);
    m3drag=null;
}
function m3up(){m3drag=null;m3sel=null;drawG();}
// Mouse events
m3cv.addEventListener('mousedown',e=>{e.preventDefault();m3down(e.clientX,e.clientY);});
m3cv.addEventListener('mousemove',e=>{if(m3drag)m3move(e.clientX,e.clientY);});
m3cv.addEventListener('mouseup',e=>m3up());
m3cv.addEventListener('mouseleave',e=>m3up());
// Touch events
m3cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];m3down(t.clientX,t.clientY);},{passive:false});
m3cv.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];m3move(t.clientX,t.clientY);},{passive:false});
m3cv.addEventListener('touchend',e=>{e.preventDefault();m3up();},{passive:false});

async function trySwap(r1,c1,r2,c2){
    m3anim=true;
    SFX.swap();
    // Animate swap
    const tmp1=m3g[r1][c1],tmp2=m3g[r2][c2];
    const steps=8;
    for(let s=1;s<=steps;s++){
        const t=s/steps;
        drawG();
        // Draw moving pieces
        const x1=c1*CL+CL/2,y1=r1*CL+CL/2+2;
        const x2=c2*CL+CL/2,y2=r2*CL+CL/2+2;
        m3x.globalAlpha=0.9;
        m3x.font='38px serif';m3x.textAlign='center';m3x.textBaseline='middle';
        m3x.fillStyle='#fff';
        // Piece 1 moves to 2
        m3x.fillText(CI[tmp1],x1+(x2-x1)*t,y1+(y2-y1)*t);
        // Piece 2 moves to 1
        m3x.fillText(CI[tmp2],x2+(x1-x2)*t,y2+(y1-y2)*t);
        m3x.globalAlpha=1;
        await new Promise(r=>setTimeout(r,18));
    }
    [m3g[r1][c1],m3g[r2][c2]]=[m3g[r2][c2],m3g[r1][c1]];
    if(!findM().length){[m3g[r1][c1],m3g[r2][c2]]=[m3g[r2][c2],m3g[r1][c1]];SFX.error();drawG();m3anim=false;return;}
    m3mv--;document.getElementById('m3m').textContent=m3mv;
    await procM();m3anim=false;chkEnd();
}
function findM(){
    const s=new Set();
    for(let r=0;r<GR;r++)for(let c=0;c<GR-2;c++)if(m3g[r][c]>=0&&m3g[r][c]===m3g[r][c+1]&&m3g[r][c]===m3g[r][c+2]){let e=c+2;while(e+1<GR&&m3g[r][e+1]===m3g[r][c])e++;for(let i=c;i<=e;i++)s.add(r*GR+i);}
    for(let c=0;c<GR;c++)for(let r=0;r<GR-2;r++)if(m3g[r][c]>=0&&m3g[r][c]===m3g[r+1][c]&&m3g[r][c]===m3g[r+2][c]){let e=r+2;while(e+1<GR&&m3g[e+1][c]===m3g[r][c])e++;for(let i=r;i<=e;i++)s.add(i*GR+c);}
    return[...s];
}
let m3combo=0;
async function procM(){
    let ms=findM();m3combo=0;
    while(ms.length){
        m3combo++;
        const pts=(ms.length*15+(ms.length>3?(ms.length-3)*25:0))*(m3combo>1?m3combo*1.5:1)|0;
        m3s+=pts;
        document.getElementById('m3s').textContent=m3s;
        // Sound based on combo/size
        if(ms.length>=5||m3combo>=3)SFX.bigMatch();else SFX.match();
        // Explode animation - flash matched cells
        const matchColors=['#FFD700','#FF6B6B','#4ECDC4','#FF9FF3','#54A0FF','#FFEAA7'];
        for(let flash=0;flash<3;flash++){
            ms.forEach(i=>{const r=~~(i/GR),c=i%GR;
                m3x.fillStyle=flash%2?matchColors[m3g[r][c]%matchColors.length]:'#fff';
                m3x.globalAlpha=0.7;m3x.beginPath();m3x.roundRect(c*CL+2,r*CL+2,CL-4,CL-4,8);m3x.fill();m3x.globalAlpha=1;
            });
            await new Promise(r=>setTimeout(r,50));
        }
        // Spawn canvas particles at matched positions
        const rect=m3cv.getBoundingClientRect();
        ms.forEach(i=>{const r=~~(i/GR),c=i%GR;
            const sx=rect.left+c*CL*(rect.width/m3cv.width)+CL/2*(rect.width/m3cv.width);
            const sy=rect.top+r*CL*(rect.height/m3cv.height)+CL/2*(rect.height/m3cv.height);
            spawnParticles(sx,sy,matchColors[m3g[r][c]%matchColors.length],4,30);
            SFX.pop();
        });
        // Show combo text
        if(m3combo>1){
            m3x.save();m3x.globalAlpha=0.9;
            m3x.fillStyle='#FFD700';m3x.font='bold 28px Nunito,sans-serif';m3x.textAlign='center';
            m3x.fillText(m3combo+'x COMBO!',m3cv.width/2,m3cv.height/2);
            m3x.restore();
        }
        ms.forEach(i=>{m3g[~~(i/GR)][i%GR]=-1;});drawG();
        await new Promise(r=>setTimeout(r,180));
        // Cascade down with sound
        SFX.cascade();
        for(let c=0;c<GR;c++){let em=GR-1;for(let r=GR-1;r>=0;r--)if(m3g[r][c]>=0){if(r!==em){m3g[em][c]=m3g[r][c];m3g[r][c]=-1;}em--;}for(let r=em;r>=0;r--)m3g[r][c]=~~(Math.random()*CI.length);}
        drawG();await new Promise(r=>setTimeout(r,220));ms=findM();
    }
}

    // Pick random icons
    const picks=[];const pool=[...MEM_ICONS];
    for(let i=0;i<memPairs;i++){const idx=~~(Math.random()*pool.length);picks.push(pool.splice(idx,1)[0]);}
    // Create pairs and shuffle
    let cards=[...picks,...picks];
    for(let i=cards.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
    cards.forEach((ic,idx)=>{
        const card=document.createElement('div');card.className='mg-card';
        card.innerHTML=`<span class="back">❓</span><span class="face">${ic}</span>`;
        card.dataset.idx=idx;card.dataset.ic=ic;
        card.onclick=()=>memFlip(card);
        grid.appendChild(card);
    });
    document.getElementById('memOv').classList.add('show');
}
function memFlip(card){
    if(memBusy||card.classList.contains('flip')||card.classList.contains('done'))return;
    SFX.tap();card.classList.add('flip');memFlipped.push(card);
    if(memFlipped.length===2){
        memMoves++;document.getElementById('memMv').textContent=memMoves;
        memBusy=true;
        const [a,b]=memFlipped;
        if(a.dataset.ic===b.dataset.ic){
            setTimeout(()=>{a.classList.add('done');b.classList.add('done');memMatched++;
                document.getElementById('memPr').textContent=memMatched+'/'+memPairs;
                SFX.match();memFlipped=[];memBusy=false;
                if(memMatched>=memPairs){memWin();}
            },400);
        } else {
            setTimeout(()=>{a.classList.remove('flip');b.classList.remove('flip');SFX.error();memFlipped=[];memBusy=false;},800);
        }
    }
}
function memWin(){
    SFX.success();spawnConfetti();
    setTimeout(()=>{
        document.getElementById('memOv').classList.remove('show');
        ntf('🎉 Hafıza oyunu tamamlandı!',SFX.success);
        if(memCb)finishAct(memCb);memCb=null;
    },600);
}

// ===== SHOP =====
let shCat='tools';
document.getElementById('shop-btn').onclick=tgShop;document.getElementById('shx').onclick=tgShop;document.getElementById('shop-ov').onclick=tgShop;
function tgShop(){const p=document.getElementById('shop-p'),o=document.getElementById('shop-ov');const s=!p.style.display||p.style.display==='none';p.style.display=s?'block':'none';o.style.display=s?'block':'none';if(s)rShop();}
function canTrade(tr){if(!tr)return false;for(const k in tr)if((storage[k]||0)<tr[k])return false;return true;}
function tradeDesc(tr){if(!tr)return'';return Object.entries(tr).map(([k,v])=>(STORAGE_CAT[k]?STORAGE_CAT[k].i:k)+v).join(' ');}
function doTrade(tr){for(const k in tr)storage[k]-=tr[k];updStorageUI();}
function rShop(){const tb=document.getElementById('stbs');tb.innerHTML='';[{k:'tools',l:'🔧 Aletler'},{k:'seeds',l:'🌱 Tohumlar'},{k:'land',l:'🏡 Arazi'}].forEach(c=>{const b=document.createElement('div');b.className='st'+(shCat===c.k?' ac':'');b.textContent=c.l;b.onclick=()=>{shCat=c.k;rShop();};tb.appendChild(b);});
const cn=document.getElementById('sitms');cn.innerHTML='';
if(shCat==='tools'){Object.entries(TOOLS).forEach(([k,t])=>{if(k==='hand')return;const ow=P.tools.includes(k),cb=P.money>=t.p&&!ow;const ct=!ow&&canTrade(t.tr);const ar=k==='tractor'?15:k==='scythe'?13:k==='axe'||k==='pickaxe'?9:7;const d=document.createElement('div');d.className='si';
d.innerHTML=`<div class="sii">${t.i}</div><div class="inf"><div class="sin">${t.n}</div><div class="sid">${ow?'✓ Alındı':t.p+' 💰'}${P.age<ar?' (Yaş '+ar+')':''}</div>${!ow&&t.tr?'<div class="trade-cost">Takas: '+tradeDesc(t.tr)+'</div>':''}</div><div style="display:flex;flex-direction:column;gap:3px">${ow?'<button class="bb ow" disabled>✓</button>':'<button class="bb gold" '+((!cb||P.age<ar)?'disabled':'')+'>💰 Al</button>'}${!ow&&t.tr?'<button class="bb trade" '+((!ct||P.age<ar)?'disabled':'')+'>📦 Takas</button>':''}</div>`;
if(!ow&&P.age>=ar){const goldBtn=d.querySelector('.bb.gold');if(goldBtn&&cb)goldBtn.onclick=()=>{P.money-=t.p;P.tools.push(k);updMon();mkTasks();rShop();updUI();ntf(t.i+' '+t.n+' aldın!',SFX.buy);};const trBtn=d.querySelector('.bb.trade');if(trBtn&&ct)trBtn.onclick=()=>{doTrade(t.tr);P.tools.push(k);mkTasks();rShop();updUI();ntf(t.i+' '+t.n+' takas ile aldın!',SFX.buy);};}cn.appendChild(d);});}
else if(shCat==='seeds'){
const d=document.createElement('div');d.className='si';
const cw=(storage.wheat||0)>=3;
d.innerHTML=`<div class="sii">🌱</div><div class="inf"><div class="sin">Buğday Tohumu</div><div class="sid">3 💰 / adet — Stok: ${P.inv.seed||0}</div><div class="trade-cost">Takas: 🌾3</div></div><div style="display:flex;flex-direction:column;gap:3px"><button class="bb gold" ${P.money<3?'disabled':''}>💰 x1</button><button class="bb trade" ${!cw?'disabled':''}>📦 Takas</button></div>`;
const bs=d.querySelectorAll('.bb');
bs[0].onclick=()=>{if(P.money>=3){P.money-=3;addItm('seed',1);updMon();rShop();ntf('🌱 Tohum aldın!',SFX.buy);}};
bs[1].onclick=()=>{if((storage.wheat||0)>=3){storage.wheat-=3;updStorageUI();addItm('seed',1);rShop();ntf('🌱 Tohum takas ile aldın!',SFX.buy);}};
cn.appendChild(d);}
else{const pl={};for(let y=0;y<SZ;y++)for(let x=0;x<SZ;x++){const t=map[y][x];if(t.pn&&!pl[t.pn])pl[t.pn]={n:t.pn,p:t.pr,o:t.own};}Object.values(pl).forEach(p=>{const d=document.createElement('div');d.className='si';d.innerHTML=`<div class="sii">🏡</div><div class="inf"><div class="sin">${p.n}</div><div class="sid">${p.o?'✓ Alındı':p.p+' 💰'}</div></div><button class="bb${p.o?' ow':''}" ${p.o||P.money<p.p?'disabled':''}>${p.o?'✓':'Al'}</button>`;cn.appendChild(d);});}}

function updUI(){
    const bar=document.getElementById('inv-bar');bar.innerHTML='';
    // Tools (skip hand)
    P.tools.forEach(k=>{if(k==='hand')return;const t=TOOLS[k],s=document.createElement('div');s.className='is'+(P.selTool===k?' sel':'');s.innerHTML=`<span>${t.i}</span>`;s.onclick=()=>{P.selTool=k;updUI();};bar.appendChild(s);});
    Object.entries(P.inv).forEach(([k,c])=>{if(c<=0||!ITEMS[k])return;const s=document.createElement('div');s.className='is';s.innerHTML=`<span>${ITEMS[k].i}</span><span class="ct">${c}</span>`;bar.appendChild(s);});
    // Task panel (collapsible)
    const tp=document.getElementById('task-panel');
    tp.style.display='block';
    let th='<div class="th" style="font-size:11px;margin-bottom:4px;padding-bottom:3px;">📋 Görevler <span style="font-size:8px;opacity:0.5">▼</span></div>';
    // Quest counter
    th+=`<div class="quest-count">Ev görevleri: ${questsDone}/${maxQuests}</div>`;
    // Tired status
    if(isTired()){
        const remain=getTiredRemain();
        const pct=Math.max(0,100-((tiredUntil-Date.now())/3600000)*100);
        th+=`<div class="tired-bar">😴 Dinleniyor (${remain} dk)<div class="tb-fill" style="width:${pct}%"></div></div>`;
        // Auto-spawn quests when rest is over
        if(!window._tiredCheck)window._tiredCheck=setInterval(()=>{if(!isTired()){clearInterval(window._tiredCheck);window._tiredCheck=null;for(let i=0;i<3;i++)spawnQuest();updUI();}},30000);
    }
    // Regular tasks
    const at=tasks.filter(t=>!t.done);
    at.forEach(t=>{const tg=t.gl.item?t.gl.count:t.gl.plow;th+=`<div class="ti" style="padding:2px 0"><div class="tn" style="font-size:10px">${t.n}</div><div class="tp"><div class="tpf" style="width:${Math.min(100,t.pg/tg*100)}%"></div></div><div class="tr" style="font-size:9px">${t.pg}/${tg} — 💰${t.rw}</div></div>`;});
    tp.innerHTML=th;
    // Storage panel
    updStorageUI();
    updMon();
}

// ===== ANIMALS UPDATE =====
function updAnim(dt){animals.forEach(a=>{
    a.mt-=dt;if(a.mt<=0){a.dir=Math.random()*Math.PI*2;a.mt=2e3+Math.random()*4e3;}
    const sp=0.003,nx=a.x+Math.cos(a.dir)*sp*dt,ny=a.y+Math.sin(a.dir)*sp*dt;
    if(nx>=1&&nx<SZ-1&&ny>=1&&ny<SZ-1){const tt=map[~~ny][~~nx].t;if(tt!==T.WATER&&tt!==T.HOUSE&&tt!==T.BARN){a.x=nx;a.y=ny;}}
    if(a.tp==='chicken'&&!a.hasEgg){a.et-=dt;if(a.et<=0)a.hasEgg=true;}
    if(a.tp==='cow'&&!a.hasMilk){a.mlt-=dt;if(a.mlt<=0)a.hasMilk=true;}
    const m=animalMeshes.get(a.id);if(m){m.position.x=a.x;m.position.z=a.y;m.rotation.y=a.dir;}
});}

// ===== MAIN LOOP =====
let lt=0,gTime=0;
function loop(t){requestAnimationFrame(loop);const dt=Math.min(t-lt,50);lt=t;gTime+=dt;updAnim(dt);updatePlayer(dt);updCam();
millBlades.forEach(b=>b.rotation.z+=dt*0.002);
// Update quest HTML overlay positions (throttled)
updateQuestPositions(t);
// Move clouds
cloudGroup.children.forEach(c=>{c.position.x+=c.userData.speed*dt;if(c.position.x>SZ+10)c.position.x=-10;});
ren.render(scene,cam);
// Render 2D particles overlay
pCtx.clearRect(0,0,pCv.width,pCv.height);
for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.002*dt;// gravity
    p.life-=p.decay;p.rot+=p.rv;
    if(p.life<=0){particles.splice(i,1);continue;}
    pCtx.save();pCtx.globalAlpha=p.life;
    pCtx.translate(p.x,p.y);pCtx.rotate(p.rot*Math.PI/180);
    pCtx.fillStyle=p.color;
    pCtx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
    pCtx.restore();
}
}

cTgt.set(10,0,12);cDist=18;
updUI();updCam();requestAnimationFrame(loop);
setTimeout(()=>ntf('🏡 Köye hoş geldin! Yere tıklayarak yürü, görevleri tamamla!',SFX.questPop),600);
